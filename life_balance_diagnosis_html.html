<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人生バランス診断</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      background: #f9f5ef;
      color: #333;
      margin: 0;
      padding: 20px;
      line-height: 1.7;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .description {
      text-align: center;
      margin-bottom: 30px;
      color: #666;
    }

    .section {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .section h2 {
      margin-top: 0;
    }

    .question {
      margin-bottom: 24px;
    }

    .question-title {
      margin-bottom: 10px;
      font-weight: bold;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
    }

    .options label {
      cursor: pointer;
    }

    .options input {
      display: none;
    }

    .options span {
      display: block;
      text-align: center;
      padding: 8px 0;
      border-radius: 999px;
      background: #f2e8dc;
    }

    .options input:checked + span {
      background: #c69252;
      color: #fff;
      font-weight: bold;
    }

    .result {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-top: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .score {
      font-size: 42px;
      font-weight: bold;
      color: #b57a36;
    }

    .category-results {
      margin-top: 20px;
      display: grid;
      gap: 8px;
    }

    .category-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 6px 0;
      gap: 16px;
    }

    .message {
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      border: none;
      background: #c69252;
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      cursor: pointer;
    }

    @media(max-width:700px) {
      .options {
        grid-template-columns: repeat(5, 1fr);
      }
      .category-row {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>人生バランス診断</h1>

    <p class="description">
      各質問に1〜10点で回答してください。<br>
      1＝ほとんど感じない ／ 10＝とても強く感じる
    </p>

    <form id="form"></form>

    <div class="result">
      <h2>総合スコア</h2>
      <div class="score" id="totalScore">-</div>
      <div class="message" id="message">回答すると結果が表示されます。</div>
      <div class="category-results" id="categoryResults"></div>
      <button type="button" id="copyButton">結果をコピー</button>
    </div>
  </div>

  <script>
    var sections = [
      {
        title: '① 知恵・叡智',
        id: 'wisdom',
        questions: [
          '自分には心から学びたい知識がある',
          '自分はこれに詳しいと言えるものがある',
          '自分の知識はここが他と違うと言い表せる',
          '自分の知識や学びは他の人のためになる',
          '自分の知識や学びは活気あるものである'
        ]
      },
      {
        title: '② 使命・目的',
        id: 'mission',
        questions: [
          'このために生きているという使命や目的がある',
          'その使命や目的を考えるだけでワクワクする',
          'その目的に沿って生きている時に他の人にもエネルギーを与えている',
          'その使命や目的は独自性がある',
          'その目的に沿って生きているとき幸せである'
        ]
      },
      {
        title: '③ 人間関係',
        id: 'relationship',
        questions: [
          '自分は良い人間関係を生きている',
          '自分の人間関係に愛を感じる',
          '自分の人間関係に感謝を感じる',
          '自分の人間関係に安らぎを感じる',
          '自分の人間関係に喜びを感じる'
        ]
      },
      {
        title: '④ 子孫',
        id: 'children',
        questions: [
          '感情的に子供とつながる時間がある',
          '子供に対して癒しを与えている',
          '子供と喜びあえる時間がある',
          '子供との愛を感じる時間がある',
          '子供からの学びがある'
        ]
      },
      {
        title: '⑤ 資産・お金',
        id: 'money',
        questions: [
          '自分が好きなことをする余裕がある',
          'お金に対して不安がない',
          '自分が欲しい分のお金を産んでくれる資産やビジネスを持っている',
          '自分はまだまだ成長できると思う',
          'チャンスや成長の予感がする'
        ]
      },
      {
        title: '⑥ 美・健康',
        id: 'health',
        questions: [
          '自分の健康に自信がある',
          '自分の外見は清潔感がある',
          '日常的に健康に対して対策している',
          '活力が内側から出ていると感じる',
          '自分を年齢より若く感じる'
        ]
      },
      {
        title: '⑦ チャレンジ',
        id: 'challenge',
        questions: [
          '自分の安心領域から意識的に出るようにしている',
          'やりたいと思うことを持っている',
          'これから1ヶ月以内にチャレンジすることが明確である',
          'そのチャレンジはワクワクするものである',
          'そのチャレンジは周りに伝わるものである'
        ]
      },
      {
        title: '⑧ スピリチュアリティ・貢献',
        id: 'spirituality',
        questions: [
          '自分は精神的にいつも穏やかである',
          '自分はいつも癒されていると感じている',
          '自分はいつも愛を感じている',
          '自分は幸福だと感じている',
          '自分だけではなく他の人のためにも生きていると思う'
        ]
      }
    ];

    function makeOptions(name) {
      var wrapper = document.createElement('div');
      wrapper.className = 'options';

      for (var i = 1; i <= 10; i++) {
        var label = document.createElement('label');
        var input = document.createElement('input');
        var span = document.createElement('span');

        input.type = 'radio';
        input.name = name;
        input.value = i;
        span.textContent = i;

        label.appendChild(input);
        label.appendChild(span);
        wrapper.appendChild(label);
      }

      return wrapper;
    }

    function renderForm() {
      var form = document.getElementById('form');

      for (var s = 0; s < sections.length; s++) {
        var section = document.createElement('div');
        section.className = 'section';

        var h2 = document.createElement('h2');
        h2.textContent = sections[s].title;
        section.appendChild(h2);

        for (var q = 0; q < sections[s].questions.length; q++) {
          var question = document.createElement('div');
          question.className = 'question';

          var title = document.createElement('div');
          title.className = 'question-title';
          title.textContent = (q + 1) + '. ' + sections[s].questions[q];

          question.appendChild(title);
          question.appendChild(makeOptions(sections[s].id + '-' + q));
          section.appendChild(question);
        }

        form.appendChild(section);
      }
    }

    function calculateScore() {
      var grandTotal = 0;
      var grandCount = 0;
      var categoryHtml = '';

      for (var s = 0; s < sections.length; s++) {
        var sectionTotal = 0;
        var sectionCount = 0;

        for (var q = 0; q < sections[s].questions.length; q++) {
          var selected = document.querySelector('input[name="' + sections[s].id + '-' + q + '"]:checked');

          if (selected) {
            sectionTotal += Number(selected.value);
            sectionCount++;
            grandTotal += Number(selected.value);
            grandCount++;
          }
        }

        var sectionScore = '-';
        if (sectionCount > 0) {
          sectionScore = (sectionTotal / sectionCount).toFixed(1) + ' / 10';
        }

        categoryHtml += '<div class="category-row"><span>' + sections[s].title + '</span><strong>' + sectionScore + '</strong></div>';
      }

      document.getElementById('categoryResults').innerHTML = categoryHtml;

      if (grandCount === 0) {
        document.getElementById('totalScore').textContent = '-';
        document.getElementById('message').textContent = '回答すると結果が表示されます。';
        return;
      }

      var average = grandTotal / grandCount;
      document.getElementById('totalScore').textContent = average.toFixed(1) + ' / 10';

      var message = '';
      if (average >= 8) {
        message = '全体的にエネルギーが高い状態です。';
      } else if (average >= 6) {
        message = '良いバランスです。';
      } else if (average >= 4) {
        message = '少し整える余地がありそうです。';
      } else {
        message = 'まずは休息と安心を大切にしてください。';
      }

      document.getElementById('message').textContent = message;
    }

    function copyResult() {
      var text = '人生バランス診断\n';
      text += '総合スコア：' + document.getElementById('totalScore').textContent + '\n\n';
      text += document.getElementById('categoryResults').innerText;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
          alert('結果をコピーしました');
        });
      } else {
        alert(text);
      }
    }

    renderForm();
    calculateScore();

    document.getElementById('form').addEventListener('change', calculateScore);
    document.getElementById('copyButton').addEventListener('click', copyResult);
  </script>
</body>
</html>
